<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>问阶管理员端</title>
    <link rel="stylesheet" href="/css/admin.css" />
  </head>
  <body>
    <main class="admin-app auth-pending">
      <section id="loginView" class="login-view">
        <form id="loginForm" class="login-panel" autocomplete="off">
          <div class="login-title">
            <p class="eyebrow">ADMIN</p>
            <h1>问阶</h1>
          </div>
          <div class="login-box">
            <input id="loginAccount" type="text" autocomplete="off" placeholder=" " required />
            <label for="loginAccount">用户名 / 邮箱</label>
          </div>
          <div class="login-box">
            <input id="loginPassword" type="password" autocomplete="new-password" placeholder=" " required />
            <label for="loginPassword">密码</label>
          </div>
          <button class="marquee-login-btn" type="submit">
            登录
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </button>
          <p id="loginMessage" class="form-message" role="status"></p>
        </form>
      </section>

      <section id="dashboardView" class="dashboard" hidden>
        <aside class="sidebar">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 64 64" role="img" focusable="false">
                <defs>
                  <linearGradient id="adminLogoGradient" x1="10" y1="8" x2="54" y2="56" gradientUnits="userSpaceOnUse">
                    <stop offset="0" stop-color="#d9fff5" />
                    <stop offset="0.52" stop-color="#80d8ff" />
                    <stop offset="1" stop-color="#bda7ff" />
                  </linearGradient>
                </defs>
                <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#adminLogoGradient)" />
                <path d="M18 40V24h7l7 10 7-10h7v24" fill="none" stroke="#0b1a22" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M22 44h7l5-6h8" fill="none" stroke="#0b1a22" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M40 18h8v8" fill="none" stroke="#0b1a22" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </div>
            <div>
              <strong>问阶 Admin</strong>
              <span id="adminName">管理员</span>
            </div>
          </div>
          <nav class="nav-list" aria-label="管理员导航">
            <button class="nav-item active" type="button" data-panel="overviewPanel">运营总览</button>
            <button class="nav-item" type="button" data-panel="usersPanel">用户管理</button>
            <button class="nav-item" type="button" data-panel="announcementPanel">公告管理</button>
            <button class="nav-item" type="button" data-panel="securityPanel">安全中心</button>
            <button class="nav-item" type="button" data-panel="statusPanel">系统状态</button>
            <button class="nav-item" type="button" data-panel="auditPanel">操作日志</button>
          </nav>
          <section class="sidebar-summary" aria-label="当前管理任务">
            <div>
              <span>当前工作台</span>
              <strong>运营总览</strong>
            </div>
            <em>6 个模块</em>
          </section>
          <button id="logoutBtn" class="ghost-btn" type="button">退出登录</button>
        </aside>

        <div class="sidebar-resizer" role="separator" aria-label="调整侧栏宽度" aria-orientation="vertical" tabindex="0"></div>

        <section class="content">
          <header class="topbar">
            <div>
              <p class="eyebrow">LIGHT ADMIN</p>
              <h2 id="panelTitle">运营总览</h2>
            </div>
            <button id="refreshBtn" class="icon-text-btn" type="button"><span aria-hidden="true">↻</span>刷新</button>
          </header>

          <section id="overviewPanel" class="panel">
            <div id="overviewStats" class="overview-stats"></div>
            <div class="overview-grid">
              <section class="status-section">
                <h3>待关注用户</h3>
                <div id="attentionUsers" class="compact-list"></div>
              </section>
              <section class="status-section">
                <h3>数据占用排行</h3>
                <div id="heavyUsers" class="compact-list"></div>
              </section>
              <section class="status-section wide-section">
                <h3>最近 7 天新增</h3>
                <div id="signupTrend" class="trend-list"></div>
              </section>
              <section class="status-section">
                <h3>数据键分布</h3>
                <div id="dataKeyStats" class="compact-list"></div>
              </section>
            </div>
          </section>

          <section id="usersPanel" class="panel" hidden>
            <div class="toolbar">
              <label class="search-box">
                <span aria-hidden="true">⌕</span>
                <input id="searchInput" type="search" placeholder="搜索用户名或邮箱" />
              </label>
              <select id="statusFilter" aria-label="状态筛选">
                <option value="">全部状态</option>
                <option value="active">启用</option>
                <option value="disabled">禁用</option>
              </select>
              <select id="roleFilter" aria-label="角色筛选">
                <option value="">全部角色</option>
                <option value="admin">管理员</option>
                <option value="user">普通用户</option>
              </select>
              <select id="loginFilter" aria-label="登录活跃筛选">
                <option value="">全部活跃</option>
                <option value="online">当前在线</option>
                <option value="never">从未登录</option>
                <option value="active7d">7 天内活跃</option>
                <option value="inactive30d">30 天未活跃</option>
              </select>
              <select id="dataFilter" aria-label="学习数据筛选">
                <option value="">全部数据</option>
                <option value="has_data">有学习数据</option>
                <option value="no_data">无学习数据</option>
                <option value="profile_ready">画像已生成</option>
                <option value="profile_missing">画像未生成</option>
              </select>
              <select id="sortSelect" aria-label="排序">
                <option value="created_desc">注册时间 ↓</option>
                <option value="created_asc">注册时间 ↑</option>
                <option value="login_desc">最近登录 ↓</option>
                <option value="login_asc">最近登录 ↑</option>
                <option value="name_asc">用户名 A-Z</option>
                <option value="name_desc">用户名 Z-A</option>
              </select>
              <button id="createUserBtn" class="primary-btn" type="button">新增账号</button>
              <button id="exportUsersBtn" class="icon-text-btn" type="button"><span aria-hidden="true">⇩</span>导出 CSV</button>
            </div>
            <div id="bulkBar" class="bulk-bar" hidden>
              <span id="bulkSummary">已选择 0 个用户</span>
              <div class="bulk-actions">
                <button id="bulkEnableBtn" class="ghost-btn" type="button">批量启用</button>
                <button id="bulkDisableBtn" class="ghost-btn" type="button">批量禁用</button>
                <button id="bulkClearDataBtn" class="ghost-btn danger-text" type="button">批量清空数据</button>
                <button id="bulkClearSelectionBtn" class="ghost-btn" type="button">取消选择</button>
              </div>
            </div>

            <div class="users-layout">
              <section class="table-shell" aria-label="用户列表">
                <table>
                  <thead>
                    <tr>
                      <th class="select-col"><input id="selectAllUsers" type="checkbox" aria-label="选择当前页全部用户" /></th>
                      <th>用户</th>
                      <th>风险</th>
                      <th>角色</th>
                      <th>状态</th>
                      <th>注册时间</th>
                      <th>最近登录</th>
                      <th>对话</th>
                      <th>错题</th>
                      <th>资源</th>
                      <th>画像</th>
                    </tr>
                  </thead>
                  <tbody id="usersBody"></tbody>
                </table>
              </section>
              <div id="usersPager" class="pager"></div>

              <aside id="detailPanel" class="detail-panel">
                <div class="empty-detail">选择一个用户查看详情</div>
              </aside>
            </div>
          </section>

          <section id="announcementPanel" class="panel" hidden>
            <div class="toolbar">
              <select id="announcementStatusFilter" aria-label="公告状态筛选">
                <option value="">全部公告</option>
                <option value="published">已发布</option>
                <option value="draft">草稿</option>
                <option value="archived">已归档</option>
              </select>
              <button id="createAnnouncementBtn" class="primary-btn" type="button">新建公告</button>
            </div>
            <div id="announcementList" class="announcement-list"></div>
          </section>

          <section id="securityPanel" class="panel" hidden>
            <div id="securityCards" class="status-grid"></div>
            <div class="toolbar">
              <label class="search-box">
                <span aria-hidden="true">⌕</span>
                <input id="sessionSearchInput" type="search" placeholder="搜索在线用户或邮箱" />
              </label>
              <select id="sessionStatusFilter" aria-label="会话状态筛选">
                <option value="active">有效会话</option>
                <option value="expired">过期会话</option>
                <option value="">全部会话</option>
              </select>
              <button id="cleanupSessionsBtn" class="ghost-btn danger-text" type="button">清理过期会话</button>
            </div>
            <section class="table-shell" aria-label="会话列表">
              <table>
                <thead>
                  <tr>
                    <th>用户</th>
                    <th>角色</th>
                    <th>会话</th>
                    <th>创建时间</th>
                    <th>过期时间</th>
                    <th>状态</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="sessionsBody"></tbody>
              </table>
            </section>
            <div id="sessionsPager" class="pager"></div>
          </section>

          <section id="statusPanel" class="panel" hidden>
            <div id="systemCards" class="status-grid"></div>
            <div id="systemDetailGrid" class="system-detail-grid"></div>
          </section>

          <section id="auditPanel" class="panel" hidden>
            <div class="toolbar">
              <label class="search-box">
                <span aria-hidden="true">⌕</span>
                <input id="auditSearchInput" type="search" placeholder="搜索管理员或对象" />
              </label>
              <select id="auditActionFilter" aria-label="操作类型筛选">
                <option value="">全部操作</option>
              </select>
              <button id="exportAuditBtn" class="icon-text-btn" type="button"><span aria-hidden="true">⇩</span>导出日志</button>
            </div>
            <section class="table-shell" aria-label="操作日志">
              <table>
                <thead>
                  <tr>
                    <th>时间</th>
                    <th>管理员</th>
                    <th>操作</th>
                    <th>对象</th>
                    <th>详情</th>
                  </tr>
                </thead>
                <tbody id="auditBody"></tbody>
              </table>
            </section>
            <div id="auditPager" class="pager"></div>
          </section>
        </section>
      </section>

      <div id="modalOverlay" class="modal-overlay" hidden>
        <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
          <header class="modal-head">
            <div>
              <p id="modalEyebrow" class="eyebrow">ADMIN ACTION</p>
              <h3 id="modalTitle">操作</h3>
            </div>
            <button id="modalCloseBtn" class="modal-close-btn" type="button" aria-label="关闭">×</button>
          </header>
          <div id="modalBody" class="modal-body"></div>
          <p id="modalMessage" class="modal-message" role="status"></p>
          <footer class="modal-actions">
            <button id="modalCancelBtn" class="ghost-btn" type="button">取消</button>
            <button id="modalConfirmBtn" class="primary-btn" type="button">确认</button>
          </footer>
        </section>
      </div>
    </main>

    <script src="/js/admin.js"></script>
  </body>
</html>
